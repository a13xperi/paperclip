name: Fork CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: fork-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Build
        run: pnpm build

      - name: Build plugins
        run: |
          cd packages/plugins/examples/plugin-atlas-api && pnpm build
          cd ../plugin-notion-sync && pnpm build
          cd ../plugin-cost-ledger && pnpm build

      - name: Run tests
        run: pnpm test:run

      - name: Verify Railway Dockerfile builds
        run: docker build -f Dockerfile.railway -t paperclip-railway-test .
